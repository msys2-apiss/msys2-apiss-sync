name: Mirror poll

# Trigger mirror-sync on mirrors when content branch HEAD differs from upstream.
# Logic: node src/cli/mirror-poll.ts (no yarn install; zero runtime deps).
# unreliable on GitHub-hosted runners; central dispatch is dependable.
# Mirrors.SyncIntervalMinutes=15 in config/sync.json (cron below).

on:
  push:
    branches:
      - main
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

concurrency:
  group: mirror-poll
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: |
            config
            src

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '26'
          package-manager-cache: false

      - name: Run mirror poll
        env:
          MIRROR_OWNER: msys2-apiss
          MSYS2_APISS_SYNC_TOKEN: ${{ secrets.MSYS2_APISS_SYNC_TOKEN }}
        run: node src/cli/mirror-poll.ts
