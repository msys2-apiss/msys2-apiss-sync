name: Sync upstream

on:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - upstream-updated
      - msys2-packages-updated
      - mingw-packages-updated
  schedule:
    - cron: '0 * * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      clean:
        description: 'Reset sync branches before replay'
        required: false
        default: false
        type: boolean

concurrency:
  group: sync-upstream
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - name: Skip scheduled run when sync already in progress
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName !== 'schedule') {
              core.setOutput('proceed', 'true');
              return;
            }
            const headers = { 'x-github-api-version': '2026-03-10' };
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'sync-upstream.yml',
              status: 'in_progress',
              per_page: 100,
              headers,
            });
            const busy = data.workflow_runs.some((run) => run.id !== context.runId);
            if (busy) {
              core.info('Another sync-upstream run is in progress; skipping scheduled run.');
              core.setOutput('proceed', 'false');
              return;
            }
            core.setOutput('proceed', 'true');

  sync:
    needs: preflight
    if: needs.preflight.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Log trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "dispatch_type=${{ github.event.action }}"
          echo "client_payload=${{ toJson(github.event.client_payload) }}"

      - name: Checkout sync repo
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '26'
          cache: yarn

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global i18n.logOutputEncoding utf-8
          git config --global i18n.commitEncoding utf-8

      - name: Clone destination repository
        env:
          MSYS2_APISS_SYNC_TOKEN: ${{ secrets.MSYS2_APISS_SYNC_TOKEN }}
        run: |
          mkdir -p .work/destination
          git clone "https://x-access-token:${MSYS2_APISS_SYNC_TOKEN}@github.com/msys2-apiss/msys2-apiss.git" .work/destination/msys2-apiss

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run sync
        run: |
          args=(--destination-path .work/destination/msys2-apiss)
          if [ "${{ inputs.clean }}" = "true" ]; then
            args+=(--clean)
          fi
          yarn sync "${args[@]}"
