name: Mirror sync from upstream

# Install on a mirror repo branch sync (set sync as default branch).
# Copy this file to: sync/.github/workflows/mirror-sync.yml
# Copy a per-repo config to: sync/.github/mirror-sync.json
#   (from config/mirror-sync/<repo-name>.json in msys2-apiss-sync; applied by yarn fetch-mirrors)
#
# master (or configured mirror branches) holds upstream history only;
# do not commit workflows to mirrored branches.
#
# Schedule: msys2-apiss-sync mirror-poll.yml triggers this via workflow_dispatch.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sync branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # PAT with repo + workflow scopes; see docs/usage.md (SYNC_DISPATCH_TOKEN).
          token: ${{ secrets.SYNC_DISPATCH_TOKEN || github.token }}

      - name: Sync from upstream
        id: sync
        run: |
          set -euo pipefail
          CONFIG=".github/mirror-sync.json"
          if [ ! -f "${CONFIG}" ]; then
            echo "Missing ${CONFIG} on sync branch"
            exit 1
          fi

          UPSTREAM_URL="$(jq -r '.UpstreamUrl' "${CONFIG}")"
          SYNC_TAGS="$(jq -r '.SyncTags // true' "${CONFIG}")"
          NOTIFY_ENABLED="$(jq -r '.Notify.Enabled // false' "${CONFIG}")"

          if [ -z "${UPSTREAM_URL}" ] || [ "${UPSTREAM_URL}" = "null" ]; then
            echo "UpstreamUrl is required in ${CONFIG}"
            exit 1
          fi

          git remote add upstream "${UPSTREAM_URL}" 2>/dev/null || \
            git remote set-url upstream "${UPSTREAM_URL}"

          BRANCH_COUNT="$(jq '.Branches | length' "${CONFIG}")"
          if [ "${BRANCH_COUNT}" -lt 1 ]; then
            echo "Branches must contain at least one entry in ${CONFIG}"
            exit 1
          fi

          ADVANCED=false
          PRIMARY_SHA=""
          PRIMARY_MIRROR_BRANCH=""

          for i in $(seq 0 $((BRANCH_COUNT - 1))); do
            UPSTREAM_BRANCH="$(jq -r ".Branches[${i}].Upstream" "${CONFIG}")"
            MIRROR_BRANCH="$(jq -r ".Branches[${i}].Mirror" "${CONFIG}")"
            echo "Syncing ${UPSTREAM_BRANCH} -> ${MIRROR_BRANCH}"

            git fetch upstream "${UPSTREAM_BRANCH}"
            git fetch origin "${MIRROR_BRANCH}" 2>/dev/null || true

            BEFORE="$(git rev-parse "origin/${MIRROR_BRANCH}" 2>/dev/null || true)"

            AFTER="$(git rev-parse "upstream/${UPSTREAM_BRANCH}")"
            if [ -n "${BEFORE}" ] && [ "${BEFORE}" = "${AFTER}" ]; then
              echo "No upstream changes for ${MIRROR_BRANCH}."
              continue
            fi

            echo "Advanced ${MIRROR_BRANCH} from ${BEFORE:-<none>} to ${AFTER}"
            ADVANCED=true

            if ! git push origin "upstream/${UPSTREAM_BRANCH}:refs/heads/${MIRROR_BRANCH}"; then
              git push --force-with-lease origin "upstream/${UPSTREAM_BRANCH}:refs/heads/${MIRROR_BRANCH}"
            fi

            if [ -z "${PRIMARY_SHA}" ]; then
              PRIMARY_SHA="${AFTER}"
              PRIMARY_MIRROR_BRANCH="${MIRROR_BRANCH}"
            fi
          done

          if [ "${SYNC_TAGS}" = "true" ]; then
            echo "Syncing tags from upstream"
            git fetch upstream --tags
            git push origin --tags || true
          fi

          if [ "${ADVANCED}" = "true" ]; then
            echo "advanced=true" >> "$GITHUB_OUTPUT"
            echo "sha=${PRIMARY_SHA}" >> "$GITHUB_OUTPUT"
            echo "ref=refs/heads/${PRIMARY_MIRROR_BRANCH}" >> "$GITHUB_OUTPUT"
          else
            echo "advanced=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "${NOTIFY_ENABLED}" = "true" ]; then
            echo "notify=true" >> "$GITHUB_OUTPUT"
            echo "notify_repository=$(jq -r '.Notify.Repository' "${CONFIG}")" >> "$GITHUB_OUTPUT"
            echo "notify_event_type=$(jq -r '.Notify.EventType' "${CONFIG}")" >> "$GITHUB_OUTPUT"
          else
            echo "notify=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify downstream
        if: steps.sync.outputs.advanced == 'true' && steps.sync.outputs.notify == 'true'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.SYNC_DISPATCH_TOKEN }}
          repository: ${{ steps.sync.outputs.notify_repository }}
          event-type: ${{ steps.sync.outputs.notify_event_type }}
          client-payload: >-
            {
              "source": "${{ github.repository }}",
              "sha": "${{ steps.sync.outputs.sha }}",
              "ref": "${{ steps.sync.outputs.ref }}"
            }
