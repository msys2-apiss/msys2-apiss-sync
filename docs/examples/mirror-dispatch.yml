name: Dispatch sync on mirror push

# Install on mirror repo branch sync (set sync as default branch).
# Copy to: sync/.github/workflows/mirror-dispatch.yml
# Runs when mirror-sync updates master; workflows stay on sync, not master.
# MSYS2-packages: event-type msys2-packages-updated
# MINGW-packages: event-type mingw-packages-updated
# Requires secret SYNC_DISPATCH_TOKEN (repo scope, can dispatch msys2-apiss-sync).

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Notify msys2-apiss-sync
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.SYNC_DISPATCH_TOKEN }}
          repository: msys2-apiss/msys2-apiss-sync
          event-type: upstream-updated
          client-payload: >-
            {
              "source": "${{ github.repository }}",
              "sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}"
            }
